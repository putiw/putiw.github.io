<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shrimp Mating Dance Lab</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172321;
        --muted: #526964;
        --panel: #f8fcfb;
        --line: #c8d7d3;
        --teal: #157f8d;
        --teal-dark: #0f6470;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #dcecea;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: minmax(720px, 1fr) 320px;
        gap: 12px;
        width: 100vw;
        height: 100vh;
        padding: 12px;
      }

      .tank-panel,
      .control-panel {
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 22px rgba(24, 55, 51, 0.08);
      }

      .tank-panel,
      .control-panel {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .tank-header,
      .control-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--line);
        background: #eef8f6;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        font-size: 16px;
        text-transform: uppercase;
        color: #304c47;
      }

      #game-root {
        position: relative;
        min-width: 0;
        min-height: 0;
        background: #132a2f;
      }

      #game-root canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      .readout {
        display: flex;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        padding: 12px;
        overflow: auto;
      }

      button {
        min-height: 42px;
        border: 1px solid #b9c9c5;
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--teal);
      }

      button.active {
        border-color: var(--teal-dark);
        background: var(--teal);
        color: #ffffff;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .timeline {
        overflow: hidden;
        height: 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
      }

      #progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--teal);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat {
        min-height: 58px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 3px;
        color: var(--ink);
        font-size: 18px;
      }

      .phase-list {
        display: grid;
        gap: 6px;
      }

      .phase {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--muted);
        font-size: 13px;
      }

      .phase.active {
        border-color: var(--teal);
        color: var(--ink);
        background: #e7f8f6;
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        main {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        #game-root {
          height: 58vh;
          min-height: 420px;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/matingDanceLab-Cri6_jUk.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="./assets/phaser-DFK5Ua9d.js">
    <link rel="modulepreload" crossorigin href="./assets/phaser-BFjO2D3v.js">
    <link rel="modulepreload" crossorigin href="./assets/TankScene-C7EjzzOS.js">
  </head>
  <body>
    <main>
      <section class="tank-panel">
        <div class="tank-header">
          <h1>Actual Tank Mating Dance Lab</h1>
          <div class="readout">
            <span id="stage-label">Approach</span>
            <span id="time-label">0.0 s</span>
          </div>
        </div>
        <div id="game-root" aria-label="Actual shrimp tank mating dance preview"></div>
      </section>

      <aside class="control-panel">
        <div class="control-header">
          <h2>Dance</h2>
          <button id="reset-button" type="button">Replay</button>
        </div>

        <div class="controls">
          <div class="button-row">
            <button id="loop-button" class="active" type="button">Loop</button>
            <button id="pause-button" type="button">Pause</button>
          </div>

          <div class="timeline">
            <div id="progress-fill"></div>
          </div>

          <div class="phase-list">
            <div class="phase" data-stage="approach">Gather <span>center</span></div>
            <div class="phase" data-stage="side-left">Female leads left <span id="side-left-detail">variable</span></div>
            <div class="phase" data-stage="side-right">Female leads right <span id="side-right-detail">variable</span></div>
            <div class="phase" data-stage="landing">Landing <span>surface contact</span></div>
            <div class="phase" data-stage="rotation">Contact tilt pulse <span id="pulse-detail">5–9 rapid</span></div>
            <div class="phase" data-stage="pregnant">Pregnant <span>done</span></div>
          </div>

          <div class="stat-grid">
            <div class="stat">Pair distance<strong id="distance-stat">0 px</strong></div>
            <div class="stat">Remaining<strong id="remaining-stat">0.0 s</strong></div>
            <div class="stat">Female speed<strong id="female-speed-stat">0 px/s</strong></div>
            <div class="stat">Male speed<strong id="male-speed-stat">0 px/s</strong></div>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
