<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shrimp Depth Figure 8 Lab</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172321;
        --muted: #526964;
        --panel: #f8fcfb;
        --line: #c8d7d3;
        --teal: #157f8d;
        --teal-dark: #0f6470;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: #dcecea;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: minmax(720px, 1fr) 300px;
        gap: 12px;
        width: 100vw;
        height: 100vh;
        padding: 12px;
      }

      .tank-panel,
      .control-panel {
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 22px rgba(24, 55, 51, 0.08);
      }

      .tank-panel {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .tank-header,
      .control-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--line);
        background: #eef8f6;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        font-size: 16px;
        text-transform: uppercase;
        color: #304c47;
      }

      #game-root {
        position: relative;
        min-width: 0;
        min-height: 0;
        background: #132a2f;
      }

      #game-root canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      .readout {
        display: flex;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .control-panel {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 0;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        padding: 12px;
        overflow: auto;
      }

      button {
        min-height: 42px;
        border: 1px solid #b9c9c5;
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--teal);
      }

      button.active {
        border-color: var(--teal-dark);
        background: var(--teal);
        color: #ffffff;
      }

      .field {
        display: grid;
        gap: 6px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #36554f;
        font-size: 14px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--teal);
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .stat {
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 2px;
        color: var(--ink);
        font-size: 18px;
      }

      .notes {
        padding: 10px 12px;
        border-top: 1px solid var(--line);
        background: #eef8f6;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }

      @media (max-width: 940px) {
        body {
          overflow: auto;
        }

        main {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        .tank-panel {
          min-height: 520px;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/depthFigure8Lab-DTIJShp-.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="./assets/phaser-DFK5Ua9d.js">
    <link rel="modulepreload" crossorigin href="./assets/phaser-BFjO2D3v.js">
  </head>
  <body>
    <main>
      <section class="tank-panel">
        <div class="tank-header">
          <h1>Depth Figure 8 Lab</h1>
          <div class="readout">
            <span id="segment-label">Behind wood</span>
            <span id="speed-label">180 px/s</span>
          </div>
        </div>
        <div id="game-root"></div>
      </section>
      <aside class="control-panel">
        <div class="control-header">
          <h2>Controls</h2>
        </div>
        <div class="controls">
          <div class="field">
            <label for="speed-range">
              <span>Speed</span>
              <strong id="speed-value">180 px/s</strong>
            </label>
            <input id="speed-range" type="range" min="70" max="420" step="5" value="180">
          </div>
          <div class="field">
            <label for="scale-range">
              <span>Shrimp size</span>
              <strong id="scale-value">1.00x</strong>
            </label>
            <input id="scale-range" type="range" min="70" max="140" step="5" value="100">
          </div>
          <div class="button-row">
            <button id="pause-button">Pause</button>
            <button id="reset-button">Reset</button>
          </div>
          <div class="stat-grid">
            <div class="stat">
              Segment
              <strong id="segment-stat">Behind wood</strong>
            </div>
            <div class="stat">
              Active depth
              <strong id="depth-stat">behind wood body</strong>
            </div>
            <div class="stat">
              Loop progress
              <strong id="progress-stat">0%</strong>
            </div>
          </div>
        </div>
        <div class="notes">
          Rock 1 and wood are independent draw layers. The shrimp passes through the wood body band behind it, crosses in front of wood but behind Rock 1, then comes forward around Rock 1.
        </div>
      </aside>
    </main>
  </body>
</html>
