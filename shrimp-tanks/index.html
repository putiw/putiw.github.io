    <style>
      html,
      body:not(.startup-complete) {
        background: #ffffff;
      }

      .startup-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #ffffff;
        opacity: 1;
        pointer-events: auto;
      }

      html.startup-cleaning .startup-card {
        display: none;
        animation: none;
      }

      .startup-screen.startup-revealing {
        animation: startup-white-screen-fade-out 1000ms ease-out forwards;
      }

      .startup-card {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      .startup-swimmer {
        width: min(36.4vw, 252px);
        aspect-ratio: 5 / 3;
        position: relative;
        animation: startup-swim-across 9200ms ease-in-out 120ms both;
      }

      .startup-bob {
        position: absolute;
        inset: 0;
        transform-origin: 50% 52%;
        animation: startup-swim-bob 860ms ease-in-out infinite;
      }

      .startup-eat-pose,
      .startup-swim-pose {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .startup-swim-pose {
        animation: startup-swim-pose-visibility 9200ms linear 120ms both;
      }

      .startup-eat-pose {
        opacity: 0;
        animation: startup-eat-pose-visibility 9200ms linear 120ms both;
      }

      .startup-part {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .startup-tail-default {
        animation: startup-tail-default 680ms steps(1, end) infinite;
      }

      .startup-tail-swim {
        opacity: 0;
        animation: startup-tail-swim 680ms steps(1, end) infinite;
      }

      .startup-eat-leg-default {
        animation: startup-eat-leg-default 960ms steps(1, end) infinite;
      }

      .startup-eat-leg-2,
      .startup-eat-leg-3 {
        opacity: 0;
      }

      .startup-eat-leg-2 {
        animation: startup-eat-leg-2 960ms steps(1, end) infinite;
      }

      .startup-eat-leg-3 {
        animation: startup-eat-leg-3 960ms steps(1, end) infinite;
      }

      @keyframes startup-white-screen-fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      @keyframes startup-swim-across {
        0% { transform: translateX(calc(50vw + 58%)); }
        43.5% { transform: translateX(0); }
        56.5% { transform: translateX(0); }
        100% { transform: translateX(calc(-50vw - 58%)); }
      }

      @keyframes startup-swim-bob {
        0%, 100% { transform: translateX(0) translateY(0) rotate(-0.3deg); }
        18% { transform: translateX(-8px) translateY(-7px) rotate(2.9deg); }
        32% { transform: translateX(-11px) translateY(-9px) rotate(3.8deg); }
        50% { transform: translateX(-2px) translateY(1px) rotate(0.5deg); }
        68% { transform: translateX(5px) translateY(7px) rotate(-2.7deg); }
        82% { transform: translateX(7px) translateY(9px) rotate(-3.4deg); }
      }

      @keyframes startup-swim-pose-visibility {
        0%, 43.49%, 56.5%, 100% { opacity: 1; }
        43.5%, 56.49% { opacity: 0; }
      }

      @keyframes startup-eat-pose-visibility {
        0%, 43.49%, 56.5%, 100% { opacity: 0; }
        43.5%, 56.49% { opacity: 1; }
      }

      @keyframes startup-tail-default {
        0%, 49.99%, 100% { opacity: 1; }
        50%, 99.99% { opacity: 0; }
      }

      @keyframes startup-tail-swim {
        0%, 49.99%, 100% { opacity: 0; }
        50%, 99.99% { opacity: 1; }
      }

      @keyframes startup-eat-leg-default {
        0%, 15%, 83.3%, 100% { opacity: 1; }
        16.7%, 81.6% { opacity: 0; }
      }

      @keyframes startup-eat-leg-2 {
        0%, 15%, 33.3%, 64.9%, 83.3%, 100% { opacity: 0; }
        16.7%, 31.6%, 50%, 64.8% { opacity: 1; }
      }

      @keyframes startup-eat-leg-3 {
        0%, 31.6%, 50%, 64.9%, 83.3%, 100% { opacity: 0; }
        33.3%, 48.2%, 66.7%, 81.6% { opacity: 1; }
      }

      @media (orientation: portrait) {
        .startup-swimmer {
          width: min(43.4vw, 210px);
        }
      }
    </style>
    <script>
      (() => {
        const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
        document.documentElement.classList.toggle("shrimp-standalone", isStandalone);
        const localDevHost = location.hostname === "127.0.0.1" || location.hostname === "localhost";
        const params = new URLSearchParams(location.search);
        const cleanRequested = params.has("sw-clean");
        if ((!localDevHost && !cleanRequested) || !("serviceWorker" in navigator)) return;
        const clearLocalPwaCache = async () => {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        };
        if (cleanRequested || navigator.serviceWorker.controller) {
          window.__shrimpStartupCleaning = true;
          document.documentElement.classList.add("startup-cleaning");
          clearLocalPwaCache().finally(() => {
            const next = new URL(location.href);
            if (cleanRequested) next.searchParams.delete("sw-clean");
            else next.searchParams.set("sw-clean", String(Date.now()));
            location.replace(next);
          });
        }
      })();
    </script>
