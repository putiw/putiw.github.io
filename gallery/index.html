<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Puti Wen's gallery</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://putiw.github.io/">
  <script>
    const galleryHome = new URL('../', window.location.href);
    galleryHome.search = window.location.search;
    galleryHome.hash = window.location.hash;
    window.location.replace(galleryHome.href);
  </script>
</head>
<body>
  <p>The gallery has moved to <a href="../">putiw.github.io</a>.</p>
</body>
</html>
